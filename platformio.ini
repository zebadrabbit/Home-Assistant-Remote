; ─────────────────────────────────────────────────────────────────────────────
; Home Assistant Remote — ELEGOO ESP32-32E (ILI9341 2.8" touch)
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    bodmer/TFT_eSPI                 @ ^2.5.43
    lvgl/lvgl                       @ ^8.3.11
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson           @ ^7.1.0
    ; links2004/WebSockets          @ ^2.4.0   ; phase-2: real-time WS events

build_flags =
    ; ── LVGL ──────────────────────────────────────────────────────────────
    -DLV_CONF_INCLUDE_SIMPLE
    -I include

    ; ── TFT_eSPI — ELEGOO ESP32-32E pin map (skips User_Setup.h) ─────────
    -DUSER_SETUP_LOADED
    -DILI9341_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000

    ; ── C++ standard & ESP32 stack ──────────────────────────────────────
    -std=gnu++17
    -DARDUINO_LOOP_STACK_SIZE=8192
